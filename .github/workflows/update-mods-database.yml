name: Mise à jour automatique de la base de données Warframe

on:
  schedule:
    - cron: '0 3 * * *'  # Tous les jours à 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-mods-database:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Exécuter l'aspirateur de données
        run: python scripts/wm_mod_arcane_names_aspirator_headless_V2.py

      - name: Committer et pousser les changements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git pull --rebase --autostash origin main

          git add data/mods_database.json data/ignored_slugs.json || true

          if git diff --cached --quiet; then
            echo "Aucun changement détecté. Fin du workflow."
            exit 0
          fi

          git commit -m "Mise à jour automatique de la base de données [skip ci]"
          git push origin main
