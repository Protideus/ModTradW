<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traducteur de mods Warframe V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-image: linear-gradient(rgba(3, 7, 18, 0.85), rgba(3, 7, 18, 0.85)), url('https://raw.githubusercontent.com/Protideus/ModTradW/main/ModTradW%20background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .pinned { border: 2px solid #22d3ee; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen transition-colors duration-300">
    <div class="max-w-5xl mx-auto p-4 sm:p-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold text-cyan-400">Traducteur de mods Warframe</h1>
                <p class="text-gray-400">Recherche multilingue • Filtres dynamiques • Mise à jour automatique quotidienne</p>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Info buttons -->
                <button onclick="showReadme()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-medium transition-colors">📖 README</button>
                <button onclick="showAuthorInfo()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-medium transition-colors">👤 Auteur</button>
            </div>
        </div>

        <!-- Last Update -->
        <div id="lastUpdate" class="text-sm text-gray-400 mb-6"></div>

        <!-- Language Filters -->
        <div class="mb-6 p-5 bg-gray-900 rounded-2xl border border-gray-700">
            <h3 class="text-lg font-semibold mb-3 text-cyan-300">Langues affichées</h3>
            <div id="languageCheckboxesContainer" class="flex flex-wrap gap-4"></div>
        </div>

        <!-- Search -->
        <input type="text" id="searchInput" 
               placeholder="Rechercher un mod (ex: Serration, Mire Rampante...)"
               class="w-full p-5 rounded-2xl bg-gray-900 border border-gray-700 focus:border-cyan-400 focus:outline-none text-lg">

        <!-- Results count -->
        <div id="resultsCount" class="mt-4 text-gray-400 text-sm hidden"></div>

        <!-- Tag Filters -->
        <div id="tagFiltersSection" class="mt-6 hidden">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-semibold text-cyan-300">Filtres par tags</h3>
                <button id="clearFiltersBtn" class="text-sm text-gray-400 hover:text-white">Effacer tout</button>
            </div>
            <div id="tagFiltersContainer" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Results -->
        <div id="resultsContainer" class="mt-8 space-y-6"></div>

        <!-- Empty state -->
        <div id="messageContainer" class="mt-12 text-center text-gray-400">
            Commencez à taper pour rechercher...
        </div>
    </div>

    <!-- Pinned Container -->
    <div id="pinnedContainer" class="fixed bottom-6 right-6 flex flex-col gap-3 max-w-xs z-50"></div>

    <!-- Modals -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-900 rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-auto">
            <div class="p-6" id="modalContent"></div>
        </div>
    </div>

    <script>
        let allItems = {};
        let selectedTags = new Set();
        let pinnedMods = new Set();
        let currentTheme = 'dark';

        const predefinedLanguageOrder = ["en", "fr", "de", "it", "es", "pt", "pl", "sv", "cs", "ru", "uk", "ko", "zh-hans", "zh-hant"];
        
        const languageNames = {
            "en": "English", "fr": "Français", "de": "Deutsch", "it": "Italiano",
            "es": "Español", "pt": "Português", "pl": "Polski", "sv": "Svenska",
            "cs": "Čeština", "ru": "Русский", "uk": "Українська", "ko": "한국어",
            "zh-hans": "中文 (Simplifié)", "zh-hant": "中文 (Traditionnel)"
        };

        const flagEmojis = {
            "en": "🇬🇧", "fr": "🇫🇷", "de": "🇩🇪", "it": "🇮🇹", "es": "🇪🇸",
            "pt": "🇧🇷", "pl": "🇵🇱", "sv": "🇸🇪", "cs": "🇨🇿", "ru": "🇷🇺",
            "uk": "🇺🇦", "ko": "🇰🇷", "zh-hans": "🇨🇳", "zh-hant": "🇹🇼"
        };

        function normalizeString(str) {
            return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        async function loadDatabase() {
            try {
                const res = await fetch('data/mods_database.json');
                const data = await res.json();
                allItems = data.items;
                document.getElementById('lastUpdate').innerHTML = `
                    Dernière mise à jour : <span class="text-cyan-400">${new Date(data.metadata.last_update).toLocaleDateString('fr-FR')}</span>
                `;
            } catch (e) {
                console.error(e);
                alert("Impossible de charger la base de données.");
            }
        }

        function generateLanguageCheckboxes() {
            const container = document.getElementById('languageCheckboxesContainer');
            container.innerHTML = '';
            predefinedLanguageOrder.forEach(lang => {
                const label = document.createElement('label');
                label.className = 'flex items-center gap-2 cursor-pointer';
                label.innerHTML = `
                    <input type="checkbox" value="${lang}" class="lang-checkbox w-5 h-5 accent-cyan-400" ${lang === 'en' || lang === 'fr' ? 'checked' : ''}>
                    <span>${flagEmojis[lang]} ${languageNames[lang]}</span>
                `;
                container.appendChild(label);
            });

            document.querySelectorAll('.lang-checkbox').forEach(cb => {
                cb.addEventListener('change', () => searchItems(document.getElementById('searchInput').value));
            });
        }

        function getSelectedLanguages() {
            return Array.from(document.querySelectorAll('.lang-checkbox:checked')).map(cb => cb.value);
        }

        function generateTagFilters(tags) {
            const container = document.getElementById('tagFiltersContainer');
            container.innerHTML = '';
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.textContent = tag;
                btn.className = `px-4 py-1.5 rounded-full text-sm font-medium transition-all ${selectedTags.has(tag) ? 'bg-cyan-500 text-black' : 'bg-gray-800 hover:bg-gray-700'}`;
                btn.onclick = () => {
                    if (selectedTags.has(tag)) selectedTags.delete(tag);
                    else selectedTags.add(tag);
                    searchItems(document.getElementById('searchInput').value);
                };
                container.appendChild(btn);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const notif = document.createElement('div');
                notif.className = 'fixed bottom-20 right-6 bg-green-600 text-white px-4 py-2 rounded-xl text-sm';
                notif.textContent = `✅ ${text} copié !`;
                document.body.appendChild(notif);
                setTimeout(() => notif.remove(), 2000);
            });
        }

        function togglePin(modKey) {
            if (pinnedMods.has(modKey)) {
                pinnedMods.delete(modKey);
            } else {
                pinnedMods.add(modKey);
            }
            renderPinnedMods();
            searchItems(document.getElementById('searchInput').value);
        }

        function renderPinnedMods() {
            const container = document.getElementById('pinnedContainer');
            const selectedLangs = getSelectedLanguages();
            container.innerHTML = '';
            
            pinnedMods.forEach(key => {
                const mod = allItems[key];
                if (!mod) return;

                // Afficher les noms basés sur les langues sélectionnées
                const translatedNames = selectedLangs.map(lang => mod.names[lang] ? `<div><span class="text-[10px] text-gray-500">${flagEmojis[lang]}</span> ${mod.names[lang]}</div>` : '').filter(Boolean).join('');
                
                const div = document.createElement('div');
                div.className = 'bg-gray-900 border border-cyan-400 rounded-2xl p-4 shadow-2xl flex items-center justify-between';
                div.innerHTML = `
                    <div class="flex items-center">
                        <div class="mr-3 font-semibold text-cyan-300 text-xs">${translatedNames || mod.names.en}</div>
                    </div>
                    <button onclick="togglePin('${key}')" class="text-red-400 hover:text-red-500 ml-2">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function searchItems(query) {
            const lowerQuery = normalizeString(query || '');
            const selectedLangs = getSelectedLanguages();
            const resultsContainer = document.getElementById('resultsContainer');
            const messageContainer = document.getElementById('messageContainer');
            const resultsCount = document.getElementById('resultsCount');
            const tagSection = document.getElementById('tagFiltersSection');

            if (lowerQuery.length < 2) {
                resultsContainer.innerHTML = '';
                messageContainer.classList.remove('hidden');
                resultsCount.classList.add('hidden');
                tagSection.classList.add('hidden');
                return;
            }

            messageContainer.classList.add('hidden');

            const matchingItems = Object.entries(allItems).filter(([key, item]) => {
                const nameMatches = Object.keys(item.names)
                    .filter(lang => selectedLangs.includes(lang))
                    .some(lang => normalizeString(item.names[lang]).includes(lowerQuery));

                const tagMatches = Array.from(selectedTags).every(tag => item.tags.includes(tag));
                
                return nameMatches && tagMatches;
            });

            resultsCount.textContent = `${matchingItems.length} résultat(s)`;
            resultsCount.classList.remove('hidden');

            const tagCounts = {};
            matchingItems.forEach(([_, item]) => {
                item.tags.forEach(tag => tagCounts[tag] = (tagCounts[tag] || 0) + 1);
            });
            const sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);
            
            if (matchingItems.length > 0) {
                generateTagFilters(sortedTags);
                tagSection.classList.remove('hidden');
            } else {
                tagSection.classList.add('hidden');
            }

            resultsContainer.innerHTML = '';
            
            matchingItems.forEach(([key, item]) => {
                const isPinned = pinnedMods.has(key);
                
                const card = document.createElement('div');
                card.className = `bg-gray-900 rounded-3xl p-6 border ${isPinned ? 'pinned border-cyan-400' : 'border-gray-700'} hover:border-cyan-500 transition-all`;
                
                let translationsHTML = '';
                predefinedLanguageOrder.forEach(lang => {
                    if (selectedLangs.includes(lang) && item.names[lang]) {
                        translationsHTML += `
                            <div class="flex items-center gap-3 py-1">
                                <span class="text-xl">${flagEmojis[lang]}</span>
                                <span class="font-medium w-20">${languageNames[lang]}:</span>
                                <span class="text-gray-300">${item.names[lang]}</span>
                                <button onclick="copyToClipboard('${item.names[lang]}')" class="ml-auto text-cyan-400 hover:text-cyan-300 text-xs">📋</button>
                            </div>`;
                    }
                });

                const imgUrl = item.thumb ? `https://warframe.market/static/assets/${item.thumb}` : '';
                const imageHTML = imgUrl 
                    ? `<img src="${imgUrl}" alt="${item.names.en}" class="w-24 h-24 object-contain rounded-2xl bg-gray-800 p-2" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\\'w-24 h-24 bg-gray-800 rounded-2xl flex items-center justify-center text-4xl\\'>📦</div>';">`
                    : `<div class="w-24 h-24 bg-gray-800 rounded-2xl flex items-center justify-center text-4xl">📦</div>`;

                card.innerHTML = `
                    <div class="flex gap-6">
                        <div class="flex-shrink-0">
                            <div class="flex items-center justify-center">
                                ${imageHTML}
                            </div>
                            <button onclick="togglePin('${key}')" 
                                    class="mt-3 w-full py-2 text-sm ${isPinned ? 'bg-red-500/20 text-red-400' : 'bg-cyan-500/10 text-cyan-400'} rounded-xl font-medium">
                                ${isPinned ? '📌 Épinglé' : '📌 Épingler'}
                            </button>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between">
                                <h2 class="text-2xl font-bold text-white">${item.names.en}</h2>
                                <span class="text-xs px-3 py-1 bg-gray-800 rounded-full">${item.rarity || 'common'}</span>
                            </div>
                            <p class="text-gray-400 mt-2">${item.description ? item.description.replace(/\n/g, '<br>') : ''}</p>
                            
                            <div class="mt-4 pt-4 border-t border-gray-700">
                                <h4 class="text-cyan-300 mb-2 text-sm font-semibold">TRADUCTIONS</h4>
                                ${translationsHTML}
                            </div>
                            
                            ${item.wiki_link ? `<a href="${item.wiki_link}" target="_blank" class="inline-block mt-4 text-cyan-400 hover:underline">→ Wiki Warframe</a>` : ''}
                        </div>
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function showReadme() {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <img src="https://raw.githubusercontent.com/Protideus/ModTradW/main/ModTradW%20banner.jpg" alt="Bannière" class="w-full rounded-2xl mb-6">
                <pre id="readmeText" class="whitespace-pre-wrap text-sm text-gray-300"></pre>
            `;
            fetch('README.md')
                .then(r => r.text())
                .then(text => { document.getElementById('readmeText').textContent = text; });
            document.getElementById('modal').classList.remove('hidden');
        }

        function showAuthorInfo() {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-6">À propos de l'auteur</h2>
                    <div class="space-y-4">
                        <p class="text-xl">Protideus</p>
                        <p class="text-gray-400">Membre du clan <span class="text-cyan-400">L-Zass</span></p>
                        <a href="https://clan-warframe.fr/" target="_blank" class="inline-block mt-4 px-6 py-3 bg-cyan-500 text-black font-semibold rounded-2xl hover:bg-cyan-400 transition-colors">
                            Visiter le site du clan
                        </a>
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.add('hidden');
        });

        let timeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                searchItems(document.getElementById('searchInput').value);
            }, 250);
        });

        document.getElementById('clearFiltersBtn').addEventListener('click', () => {
            selectedTags.clear();
            searchItems(document.getElementById('searchInput').value);
        });

        window.onload = async () => {
            await loadDatabase();
            generateLanguageCheckboxes();
        };
    </script>
</body>
</html>
